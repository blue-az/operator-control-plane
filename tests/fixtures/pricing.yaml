# This lives under tests/fixtures/ so the suite is self-contained: the real
# runtime table lives in the gitignored .operator/ ledger and must not be a
# test dependency.
claude-opus-4-8:
  input: 15.0
  output: 75.0
  cache_read: 1.5
  cache_write: 18.75
