task_id: alias-add
description: >
  Add a power-limit alias to a bash aliases file. Recreates the original
  gemma4:26b/31b experiment cited in LOCAL_LANE_CONTRACT_SPEC.md's Evidence
  section.

files:
  bash/.bash_aliases: |
    alias ll='ls -la'
    alias gs='git status'
    alias nv='nvidia-smi'
    alias k='kubectl'

prompts:
  L0: "Please change my alias file. Add 200 for sudo nvidia-smi -pl 200 to it."
  L1: >
    Add an alias 200 for sudo nvidia-smi -pl 200 to my alias file, in
    bash/.bash_aliases.
  L2: |
    1. In bash/.bash_aliases, after the line "alias nv='nvidia-smi'", add a new line "alias 200='sudo nvidia-smi -pl 200'".
    2. Verify the file now contains the line "alias 200='sudo nvidia-smi -pl 200'".
    Only touch bash/.bash_aliases.

postcondition:
  type: grep
  file: bash/.bash_aliases
  pattern: "alias 200='sudo nvidia-smi -pl 200'"
